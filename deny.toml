# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/.

[graph]
all-features = true

[advisories]
# Fail on any unmaintained or vulnerable advisory; allow yanked crates as a
# warning since they may show up transiently.
yanked = "warn"
ignore = [
    # `paste` is archived but still pulled in by ratatui's dependency tree.
    # It's a pure proc-macro crate (no runtime, no I/O, no security surface),
    # and ratatui upstream tracks the migration. Re-evaluate when ratatui
    # ships a release that drops it.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[licenses]
# Permissive licenses we accept for transitive deps.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # The Mozilla CA root bundle shipped by webpki-roots (via ureq's rustls TLS).
    # A permissive data license; bundling the roots lets the distroless image
    # do HTTPS without a system trust store.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
