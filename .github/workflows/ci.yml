name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: default
            flags: ""
          - features: minimal
            flags: "--no-default-features"
          - features: tui-only
            flags: "--no-default-features --features tui"
          - features: pprof-only
            flags: "--no-default-features --features pprof"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.features }}
      - run: cargo clippy --all-targets ${{ matrix.flags }} -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories

  test:
    name: test (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: cargo test (default features)
        run: cargo test --target ${{ matrix.target }}
      - name: cargo test (--no-default-features)
        run: cargo test --target ${{ matrix.target }} --no-default-features
      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

  smoke:
    name: smoke (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-smoke
      - name: install PHP
        run: ./scripts/ci/install-php.sh
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: smoke
        run: ./scripts/ci/smoke.sh ./target/${{ matrix.target }}/release/pfp

  smoke-zts:
    name: smoke-zts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            php_image: php:8.3-zts
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            php_image: php:8.3-zts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-smoke-zts
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: smoke (ZTS)
        run: ./scripts/ci/smoke-zts.sh ./target/${{ matrix.target }}/release/pfp ${{ matrix.php_image }}

  smoke-pyroscope:
    name: smoke-pyroscope
    runs-on: ubuntu-latest
    needs: test
    services:
      pyroscope:
        image: grafana/pyroscope:latest
        ports:
          - 4040:4040
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-smoke-pyroscope
      - name: install PHP
        run: ./scripts/ci/install-php.sh
      - name: build
        run: cargo build --release
      - name: smoke (pyroscope)
        run: ./scripts/ci/smoke-pyroscope.sh ./target/release/pfp
